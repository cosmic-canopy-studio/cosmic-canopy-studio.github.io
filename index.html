<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Canopy Games</title>
    <meta name="description" content="Indie games with a penchant for open source and knowledge sharing.">
    <link rel="icon" type="image/png" href="./assets/favicon-32.png" sizes="32x32">
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #ccc; line-height: 1.6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1.5rem; overflow: hidden; background: #0d0d0d; }

        .bg { position: fixed; inset: -30px; background: url('./assets/hero.webp') center/cover no-repeat; animation: ken-burns 45s ease-in-out infinite alternate; transition: transform 0.3s ease-out; z-index: -1; }

        @keyframes ken-burns {
            0%   { transform: scale(1.05) translate(0, 0); }
            100% { transform: scale(1.12) translate(-1%, -0.5%); }
        }

        .card { background: rgba(0, 0, 0, 0.92); border-radius: 24px; padding: 3rem 2.5rem; text-align: center; max-width: 480px; width: 100%; }

        .icon { width: 80px; height: 80px; border-radius: 22.37%; margin-bottom: 1.5rem; }
        h1 { font-size: 1.75rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
        .tagline { font-size: 1rem; color: #999; margin-bottom: 2.5rem; }

        .games { margin-bottom: 2.5rem; }
        .game-link { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.25rem; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; text-decoration: none; color: #fff; font-weight: 500; transition: border-color 0.15s; }
        .game-link:hover { border-color: #2d8f47; }
        .game-link img { width: 28px; height: 28px; border-radius: 6px; }

        .links { display: flex; gap: 1.5rem; justify-content: center; }
        .links a { color: #6db3f8; text-decoration: none; font-size: 0.875rem; }
        .links a:hover { text-decoration: underline; }

        footer { margin-top: 2rem; font-size: 0.75rem; color: #444; }
    </style>
</head>
<body>
    <div class="bg" id="bg"></div>
    <div class="card">
        <img class="icon" src="./assets/icon.webp" alt="Cosmic Canopy" width="80" height="80">
        <h1>Cosmic Canopy Games</h1>
        <p class="tagline">Indie games with a penchant for open source and knowledge sharing.</p>

        <div class="games">
            <a class="game-link" href="https://lacrossebosse.com">
                <img src="https://lacrossebosse.com/assets/icon-160.webp" alt="Lacrosse Bosse" width="28" height="28">
                Lacrosse Bosse
            </a>
        </div>

        <div class="links">
            <a href="https://github.com/cosmic-canopy-studio">GitHub</a>
            <a href="mailto:hello@cosmiccanopystudio.com">Contact</a>
        </div>

        <footer>&copy; 2025–2026 Cosmic Canopy Studio</footer>
    </div>
    <script>
        const bg = document.getElementById('bg');
        document.addEventListener('mousemove', e => {
            const x = (e.clientX / innerWidth - 0.5) * 15;
            const y = (e.clientY / innerHeight - 0.5) * 15;
            bg.style.transform = `translate(${-x}px, ${-y}px) scale(1.08)`;
            bg.style.animationPlayState = 'paused';
        });
        document.addEventListener('mouseleave', () => {
            bg.style.transform = '';
            bg.style.animationPlayState = 'running';
        });
    </script>
</body>
</html>
